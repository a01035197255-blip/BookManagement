version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  build:
    commands:
      - cd backend
      - chmod +x gradlew
      - ./gradlew clean build -x test

  post_build:
    commands:
      - cd ..
      - mkdir -p deploy-backend
      - cp backend/build/libs/*.jar deploy-backend/Book.jar
      - cp backend/Procfile deploy-backend/ || true
      - '[ -d backend/.ebextensions ] && cp -r backend/.ebextensions deploy-backend/ || true'
      - ls -la deploy-backend/

artifacts:
  files:
    - '**/*'
  base-directory: deploy-backend